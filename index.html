<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Bucks</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">✈ AIR BUCKS</div>
        <nav id="views-nav">
          <button class="view-tab active" data-view="map">Map</button>
          <button class="view-tab" data-view="finance">Finance</button>
          <button class="view-tab" data-view="competitors">Competitors</button>
          <button class="view-tab" data-view="awards">Awards</button>
        </nav>
        <div id="hud"></div>
        <div id="controls">
          <button id="new-game" class="icon-btn" title="New game">⟲</button>
          <button id="save-game" class="icon-btn" title="Save now">💾</button>
          <button id="load-game" class="icon-btn" title="Load last save">📂</button>
          <div id="speeds">
            <button data-speed="1" class="speed active">1×</button>
            <button data-speed="2" class="speed">2×</button>
            <button data-speed="4" class="speed">4×</button>
          </div>
          <button id="play" class="primary">▶ Play</button>
        </div>
      </header>
      <main id="views">
        <div id="stage">
          <div id="map-wrap">
            <canvas id="map"></canvas>
            <button id="reset-view" title="Reset view (or double-click the map)">⤢ Reset view</button>
            <button id="toggle-competitors" class="map-toggle active" title="Show/hide competitor route networks">◔ Competitors</button>
            <div id="home-select" class="hidden">
              <div id="ai-count-row">
                <span class="ai-count-label">Competitors</span>
                <div id="ai-count"></div>
              </div>
              <div class="home-title">✈ Choose your home airport</div>
            </div>
          </div>
          <aside id="sidebar"></aside>
        </div>
        <section id="finance" class="hidden"></section>
        <section id="competitors" class="hidden"></section>
        <section id="awards" class="hidden"></section>
      </main>
      <footer id="log"></footer>
    </div>
    <div id="upgrade-select" class="overlay hidden">
      <div class="overlay-box">
        <div class="overlay-title" id="upgrade-title">Upgrade fleet</div>
        <p class="overlay-sub" id="upgrade-sub"></p>
        <div id="upgrade-list"></div>
        <button id="upgrade-cancel" class="overlay-cancel">Cancel</button>
      </div>
    </div>
    <div id="slot-granted" class="overlay hidden">
      <div class="overlay-box slot-box">
        <button id="slot-later" class="slot-x" title="Close">✕</button>
        <img id="slot-photo" class="slot-photo hidden" alt="" />
        <div class="overlay-title">✈ Landing rights granted</div>
        <div id="slot-city" class="slot-city"></div>
        <div id="slot-stats" class="overlay-sub"></div>
        <div class="slot-actions">
          <button id="slot-plan" class="primary">Plan a route</button>
        </div>
        <div id="slot-credit" class="slot-credit hidden">Vintage postcard · Tichnor Bros. · public domain</div>
      </div>
    </div>
    <div id="distress" class="overlay hidden">
      <div class="overlay-box">
        <div class="overlay-title">⚠ Airline in distress</div>
        <div id="distress-name" class="slot-city"></div>
        <div id="distress-stats" class="overlay-sub"></div>
        <div class="slot-actions">
          <button id="distress-view" class="primary">View competitors</button>
          <button id="distress-later" class="overlay-cancel">Dismiss</button>
        </div>
      </div>
    </div>
    <div id="win-screen" class="overlay hidden">
      <div class="overlay-box">
        <div class="overlay-title">🏆 You rule the skies</div>
        <p id="win-sub" class="overlay-sub"></p>
        <div id="win-stats" class="win-stats"></div>
        <div class="row" style="margin-top:14px; gap:8px; justify-content:flex-end">
          <button id="win-quit" class="overlay-cancel">Quit</button>
          <button id="win-keep" class="primary">Keep playing</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
