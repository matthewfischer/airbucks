<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Bucks</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">✈ AIR BUCKS</div>
        <div id="hud"></div>
        <div id="controls">
          <button id="new-game" title="Start a new game">⟲ New Game</button>
          <button id="save-game" title="Save now">Save</button>
          <button id="load-game" title="Load last save">Load</button>
          <div id="speeds">
            <button data-speed="1" class="speed active">1×</button>
            <button data-speed="2" class="speed">2×</button>
            <button data-speed="4" class="speed">4×</button>
          </div>
          <button id="play" class="primary">▶ Play</button>
        </div>
      </header>
      <main id="stage">
        <div id="map-wrap">
          <canvas id="map"></canvas>
          <button id="reset-view" title="Reset view (or double-click the map)">⤢ Reset view</button>
        </div>
        <aside id="sidebar"></aside>
      </main>
      <footer id="log"></footer>
    </div>
    <div id="home-select" class="overlay hidden">
      <div class="overlay-box">
        <div class="overlay-title">✈ Choose your home airport</div>
        <p class="overlay-sub">Pick the city where you'll build your airline. Major hubs are not available — you'll have to earn them.</p>
        <div id="home-airport-list"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
